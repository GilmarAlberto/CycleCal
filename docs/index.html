<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CycleCal</title>

        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#2FAF8A" />

        <link rel="icon" href="icon-256.png" type="image/png" />

        <link rel="stylesheet" href="css/styles.css" />
    </head>

    <body>
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <img src="icon-256.png" class="logo" />

                    <div class="title-group">
                        <div class="title-line">
                            <h1>CycleCal</h1>
                            <span id="app-version" class="version"></span>
                        </div>

                        <div id="userGreeting"></div>

                        <div id="controle-folgas">Controle de Escalas e Folgas</div>
                    </div>
                </div>

                <button class="btn-hoje" id="btnHoje" onclick="irParaHoje()"></button>
            </div>

            <div class="line"></div>

            <div class="controls">
                <button onclick="mesAnterior()">◀</button>

                <div class="periodo">
                    <span id="mesTexto"></span>
                    <span id="anoTexto"></span>
                </div>

                <button onclick="proximoMes()">▶</button>
            </div>

            <div class="calendar" id="calendario"></div>

            <div style="margin-top: 15px; text-align: center">
                <button id="btnSetup">Setup ⚙</button>
                <button id="btnHistorico">Histórico 📜</button>
            </div>

            <div class="footer">
                <div id="infoEscala"></div>
                <div id="footerBase"></div>

                <div class="legend" id="birthdayLegend">🎂 Aniversário</div>

                <div class="legend" id="vacationLegend"><span class="legend-box vacation"></span> Férias</div>

                <div class="holidays" id="listaFeriados"></div>
            </div>
        </div>

        <script>
            const config = {
                appName: "CycleCal",
                version: "1.9.10b",
                debug: false,
            };

            const mesesAbreviados = [
                "JAN",
                "FEV",
                "MAR",
                "ABR",
                "MAI",
                "JUN",
                "JUL",
                "AGO",
                "SET",
                "OUT",
                "NOV",
                "DEZ",
            ];

            let anoAtual;
            let mesAtual;
            let yearBlockStart;
            let vacations = [];
            let shiftSwaps = [];
            let userModifiedScale = false;
            let isApplyingPreset = false;
            let feriasFormAberto = false;
            let calendar = { year: null, month: null, days: [] };

            function getCycleDay(date, config) {
                const { startDate, cycle, offset = 0 } = config;

                const base = new Date(startDate);
                const current = new Date(date);

                base.setHours(0, 0, 0, 0);
                current.setHours(0, 0, 0, 0);

                const diffDays = Math.floor((current - base) / (1000 * 60 * 60 * 24));

                const index = (diffDays + offset) % cycle.length;
                const safeIndex = (index + cycle.length) % cycle.length;

                return cycle[safeIndex];
            }

            function parsePattern(pattern) {
                // suporta "4x2", "5x1", "2x2", etc
                const match = pattern.match(/^(\d+)x(\d+)$/);

                if (!match) return ["T", "F"]; // fallback simples

                const work = Number(match[1]);
                const rest = Number(match[2]);

                return [...Array(work).fill("T"), ...Array(rest).fill("F")];
            }

            function generateMonth(year, month, config) {
                const days = [];

                const totalDays = new Date(year, month + 1, 0).getDate();

                for (let day = 1; day <= totalDays; day++) {
                    const date = new Date(year, month, day);

                    days.push({
                        date: new Date(date),
                        type: getCycleDay(date, config),
                    });
                }

                return days;
            }

            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("app-version").textContent = `v${config.version}`;
            });

            function getSetupModal() {
                return document.getElementById("setupModal");
            }

            // 💾 v1.9.8 — Persistência via storage.js
            // initUser(), getUser() e saveUser() foram removidos.
            // Use: window.initStorage() | window.loadUser() | window.saveUser(user) | window.clearUser()

            function atualizarLabelBaseDate(area) {
                const label = document.getElementById("labelBaseDate");
                const outrosWrapper = document.getElementById("outrosScaleTypeWrapper");
                const scaleFieldsWrapper = document.getElementById("scaleFieldsWrapper");
                if (!label) return;

                const setupScaleType = document.getElementById("setupScaleType");

                if (area === "outros") {
                    if (outrosWrapper) outrosWrapper.style.display = "";
                    if (scaleFieldsWrapper) scaleFieldsWrapper.style.display = "";
                    if (setupScaleType) { setupScaleType.removeAttribute("readonly"); setupScaleType.style.display = "none"; }
                    const scaleTypeLabel = setupScaleType?.previousElementSibling;
                    if (scaleTypeLabel && scaleTypeLabel.tagName === "LABEL") scaleTypeLabel.style.display = "none";
                    const scaleType = document.getElementById("outrosScaleType")?.value;
                    const dsrField = document.getElementById("dsrWrapper");
                    if (dsrField) dsrField.style.display = scaleType === "semanal" ? "" : "none";
                    const patternInput = document.getElementById("setupScalePattern");
                    if (patternInput && !patternInput.value) {
                        patternInput.placeholder = scaleType === "semanal" ? "ex: 6x1" : "ex: 12x36";
                    }
                    if (scaleType === "semanal") {
                        label.textContent = "Informe o último domingo de folga";
                    } else {
                        label.textContent = "Informe o último dia trabalhado";
                    }
                } else {
                    if (outrosWrapper) outrosWrapper.style.display = "none";
                    if (scaleFieldsWrapper) scaleFieldsWrapper.style.display = "";
                    if (setupScaleType) { setupScaleType.setAttribute("readonly", true); setupScaleType.style.display = ""; }
                    const scaleTypeLabel = setupScaleType?.previousElementSibling;
                    if (scaleTypeLabel && scaleTypeLabel.tagName === "LABEL") scaleTypeLabel.style.display = "";
                    if (area === "supermercado") {
                        label.textContent = "Informe o último domingo de folga";
                    } else {
                        label.textContent = "Informe o último dia trabalhado";
                    }
                }
            }

            function renderAreaSelect() {
                const select = document.getElementById("areaSelect");

                if (!select) return;

                select.innerHTML = "";

                AREAS.forEach((area) => {
                    const option = document.createElement("option");
                    option.value = area.value;
                    option.textContent = area.label;
                    select.appendChild(option);
                });

                const user = window.loadUser();
                select.value = user.profile.area || "outros";
            }

            function applyAreaPreset(area) {
                // Áreas fixas sempre aplicam o preset; só respeita userModifiedScale em "outros"
                if (userModifiedScale && area === "outros") return;

                const preset = AREA_PRESETS[area];
                if (!preset) return;

                isApplyingPreset = true;

                document.getElementById("setupScaleType").value = preset.scale_type;
                document.getElementById("setupScalePattern").value = preset.scale_pattern;

                // 🔥 SALVAR NO USER
                const user = window.loadUser();
                user.settings.scale_type = preset.scale_type;
                user.settings.scale_pattern = preset.scale_pattern;
                //window.saveUser(user);
                //showToast("Salvo com sucesso!", "success");

                isApplyingPreset = false;
            }

            function getBaseDate() {
                const user = window.loadUser();

                if (user.settings.base_date) {
                    return new Date(user.settings.base_date);
                }

                // fallback padrão atual
                return new Date(2026, 1, 15);
            }

            function setBaseDate(dateStr) {
                const user = window.loadUser();

                user.settings.base_date = dateStr;

                window.saveUser(user);

                baseFolgaDomingo = new Date(dateStr);

                gerarCalendario(anoAtual, mesAtual);
            }

            function alterarBaseDate() {
                const novaData = prompt("Informe a nova data base (AAAA-MM-DD):");

                if (!novaData) return;

                setBaseDate(novaData);
            }

            function setScaleType(type) {
                const user = window.loadUser();

                user.settings.scale_type = type;

                window.saveUser(user);
            }

            function alterarTipoEscala() {
                const tipo = prompt("Tipo de escala (ex: semanal, plantao)");

                if (!tipo) return;

                setScaleType(tipo);
            }

            function setScalePattern(pattern) {
                const user = window.loadUser();

                user.settings.scale_pattern = pattern;

                window.saveUser(user);
            }

            function alterarPadraoEscala() {
                const pattern = prompt("Padrão da escala (ex: 7, 5x1, 12x36)");

                if (!pattern) return;

                setScalePattern(pattern);
            }

            async function salvarFerias() {
                await window.saveVacations(vacations);
            }

            async function carregarShiftSwaps() {
                shiftSwaps = await window.loadShiftSwaps();
                window._shiftSwaps = shiftSwaps;
            }

            async function salvarShiftSwaps() {
                await window.saveShiftSwaps(shiftSwaps);
                window._shiftSwaps = shiftSwaps;
            }

            async function carregarFerias() {
                vacations = await window.loadVacations();
            }

            // Controla visibilidade do botão Adicionar período com base nas férias futuras
            function atualizarBtnAdicionarFerias() {
                if (feriasFormAberto) return;
                const hoje = new Date().toISOString().slice(0, 10);
                const jaTemFutura = vacations.some((v) => v.end >= hoje);
                const btn = document.getElementById("setupSalvarFeriasBtn");
                if (btn) btn.style.display = jaTemFutura ? "none" : "";
            }

            window.addEventListener("cyclecal:ready", async function () {
                window.initStorage();
                await window.migrateToIndexedDB();

                baseFolgaDomingo = getBaseDate();

                await carregarFerias();
                await carregarShiftSwaps();

                preencherSetup();
                verificarPerfil();
                atualizarSaudacao();
                atualizarFooterBase();
                atualizarInfoEscala();
                agendarAtualizacaoDiaria();

                // 🔥 ATIVA SALVAR AO MODIFICAR
                document.getElementById("setupUserName").addEventListener("input", ativarSalvar);
                document.getElementById("setupBirthday").addEventListener("input", ativarSalvar);
                document.getElementById("setupBaseDate").addEventListener("input", ativarSalvar);
                document.getElementById("setupScaleType").addEventListener("input", ativarSalvar);
                document.getElementById("setupScalePattern").addEventListener("input", ativarSalvar);

                document.getElementById("areaSelect").addEventListener("change", ativarSalvar);
                document.getElementById("setupDSR").addEventListener("change", ativarSalvar);

                const user = window.loadUser();

                if (!user.profile.area) {
                    user.profile.area = "outros";
                    window.saveUser(user);
                }

                renderAreaSelect();

                const areaSelect = document.getElementById("areaSelect");

                areaSelect.addEventListener("change", (e) => {
                    const user = window.loadUser();
                    const oldArea = user.profile.area;
                    const newArea = e.target.value;
                    user.profile.area = newArea;
                    //window.saveUser(user);

                    if (newArea !== "outros") {
                        userModifiedScale = false;
                    }
                    if (oldArea !== newArea || newArea !== "outros") {
                        applyAreaPreset(e.target.value);
                    }
                    if (newArea === "outros") {
                        document.getElementById("setupScalePattern").value = "";
                    }

                    atualizarLabelBaseDate(e.target.value);

                    const dsrField = document.getElementById("dsrWrapper");

                    if (AREAS_WITHOUT_DSR.includes(e.target.value)) {
                        dsrField.style.display = "none";
                        document.getElementById("setupDSR").value = "0";
                    } else if (e.target.value !== "outros") {
                        dsrField.style.display = "";
                    }
                    // para "outros", o dsrWrapper é controlado pelo outrosScaleType
                });

                document.getElementById("setupScaleType").addEventListener("input", () => {
                    if (isApplyingPreset) return;
                    userModifiedScale = true;
                    const area = document.getElementById("areaSelect")?.value;
                    if (area === "outros") atualizarLabelBaseDate("outros");
                });

                document.getElementById("setupScalePattern").addEventListener("input", () => {
                    if (isApplyingPreset) return;
                    userModifiedScale = true;
                });

                document.getElementById("outrosScaleType").addEventListener("change", () => {
                    atualizarLabelBaseDate("outros");
                    const scaleType = document.getElementById("outrosScaleType")?.value;
                    const dsrField = document.getElementById("dsrWrapper");
                    if (dsrField) dsrField.style.display = scaleType === "semanal" ? "" : "none";
                    const patternInput = document.getElementById("setupScalePattern");
                    patternInput.value = "";
                    patternInput.placeholder = scaleType === "semanal" ? "ex: 6x1" : "ex: 12x36";
                });

                const birthdayInput = document.getElementById("setupBirthday");

                if (birthdayInput) {
                    birthdayInput.addEventListener("input", function (e) {
                        let v = e.target.value.replace(/\D/g, "");

                        if (v.length > 4) v = v.slice(0, 4);

                        if (v.length >= 3) {
                            v = v.slice(0, 2) + "/" + v.slice(2);
                        }

                        e.target.value = v;
                    });
                }

                baseFolgaDomingo = getBaseDate();

                const hoje = new Date();
                anoAtual = hoje.getFullYear();
                mesAtual = hoje.getMonth();

                gerarCalendario(anoAtual, mesAtual);
                document.getElementById("btnHoje").innerText = hoje.getDate();

                document.getElementById("btnSetup").onclick = function () {
                    //userModifiedScale = false;
                    mostrarSetup();
                };

                document.getElementById("setupFechar").onclick = function () {
                    preencherSetup(); // 🔥 garante reset total

                    getSetupModal().style.display = "none";
                    document.body.style.overflow = "";
                };

                document.getElementById("setupSalvar").onclick = function () {
                    const baseDate = document.getElementById("setupBaseDate").value;
                    const userName = document.getElementById("setupUserName").value;

                    const birthdayInput = document.getElementById("setupBirthday").value;

                    let birthday = "";

                    if (birthdayInput && birthdayInput.includes("/")) {
                        const [d, m] = birthdayInput.split("/");

                        if (!d || !m) {
                            showToast("Data incompleta.", "error");
                            return;
                        }

                        if (!isValidDate(d, m)) {
                            showToast("Data de aniversário inválida.", "error");
                            return;
                        }

                        const dPad = d.padStart(2, "0");
                        const mPad = m.padStart(2, "0");

                        document.getElementById("setupBirthday").value = `${dPad}/${mPad}`;

                        birthday = `2000-${mPad}-${dPad}`;
                    }

                    if (!userName) {
                        showToast("Como deseja ser chamado?", "error");
                        return;
                    }

                    if (!baseDate) {
                        showToast("Informe a data base da escala.", "error");
                        return;
                    }

                    const user = window.loadUser();
                    user.profile.name = userName;
                    user.profile.birthday = birthday;

                    user.profile.area = document.getElementById("areaSelect").value || "outros";

                    user.settings.base_date = baseDate;

                    user.settings.scale_type = document.getElementById("setupScaleType").value;

                    user.settings.scale_pattern = document.getElementById("setupScalePattern").value;

                    user.settings.dsr = Number(document.getElementById("setupDSR").value);

                    registrarEscalaNoHistorico(
                        user,
                        user.settings.base_date,
                        user.settings.scale_pattern,
                        user.settings.scale_type,
                    );

                    aplicarSetup(user);

                    showToast("Salvo com sucesso!", "success");

                    getSetupModal().style.display = "none";
                    document.body.style.overflow = "";
                };

                document.getElementById("setupSalvarFeriasBtn").addEventListener("click", async function () {
                    // Bloqueia se já existe uma férias futura pendente
                    const hoje = new Date().toISOString().slice(0, 10);
                    const jaTemFutura = vacations.some((v) => v.end >= hoje);
                    if (jaTemFutura) {
                        showToast("Já há um período de férias agendado.", "error");
                        return;
                    }

                    const form = document.getElementById("feriasForm");

                    form.classList.add("active");
                    feriasFormAberto = true;

                    document.getElementById("setupSalvarFeriasBtn").style.display = "none";
                    document.querySelector(".setup-footer").style.display = "none";

                    setTimeout(() => {
                        form.scrollIntoView({ behavior: "smooth", block: "end" });
                    }, 200);
                });

                document.getElementById("btnConfirmarFerias").addEventListener("click", async function () {
                    const inicio = document.getElementById("setupFeriasInicio").value;
                    const fim = document.getElementById("setupFeriasFim").value;

                    if (!inicio || !fim) {
                        showToast("Informe as datas.", "error");
                        return;
                    }

                    if (fim < inicio) {
                        showToast("Data final inválida.", "error");
                        return;
                    }

                    const exists = vacations.some((v) => v.start === inicio && v.end === fim);
                    if (exists) {
                        showToast("Período já adicionado.", "error");
                        return;
                    }

                    // Defesa dupla: garante que não há outra futura além da que está sendo adicionada
                    const hojeStr = new Date().toISOString().slice(0, 10);
                    const jaTemFutura = vacations.some((v) => v.end >= hojeStr);
                    if (jaTemFutura) {
                        showToast("Já há um período de férias agendado.", "error");
                        return;
                    }

                    vacations.push({ start: inicio, end: fim });

                    await salvarFerias();
                    ativarSalvar();
                    gerarCalendario(anoAtual, mesAtual);
                    renderListaFeriasSetup();

                    showToast("Férias adicionadas!", "success");

                    // reset
                    const form = document.getElementById("feriasForm");
                    form.classList.remove("active");

                    feriasFormAberto = false;

                    document.getElementById("setupFeriasInicio").value = "";
                    document.getElementById("setupFeriasFim").value = "";

                    atualizarBtnAdicionarFerias();
                    document.querySelector(".setup-footer").style.display = "flex";
                });

                document.getElementById("btnCancelarFerias").addEventListener("click", function () {
                    const form = document.getElementById("feriasForm");
                    const btn = document.getElementById("setupSalvarFeriasBtn");

                    // fecha form
                    form.classList.remove("active");

                    // reseta botão principal
                    btn.textContent = "Adicionar período";
                    btn.classList.remove("active");

                    feriasFormAberto = false;

                    atualizarBtnAdicionarFerias();
                    document.querySelector(".setup-footer").style.display = "flex";

                    // limpa inputs
                    document.getElementById("setupFeriasInicio").value = "";
                    document.getElementById("setupFeriasFim").value = "";
                });

                // ===== PICKER + SWIPE (UNIFICADO) =====

                let overlay = document.getElementById("pickerOverlay");

                const mesEl = document.getElementById("mesTexto");
                const anoEl = document.getElementById("anoTexto");

                function openPicker() {
                    renderMonthPicker();
                    overlay.hidden = false;

                    requestAnimationFrame(() => {
                        overlay.classList.add("active");
                    });
                }

                mesEl.addEventListener("click", openPicker);

                anoEl.addEventListener("click", function (e) {
                    e.stopPropagation();

                    renderYearPicker();
                    overlay.hidden = false;

                    requestAnimationFrame(() => {
                        overlay.classList.add("active");
                    });
                });

                overlay.addEventListener("click", function (e) {
                    if (e.target === overlay) {
                        closePicker();
                    }
                });

                // SWIPE
                let touchStartX = 0;
                let touchStartY = 0;

                const calendarioEl = document.getElementById("calendario");

                if (calendarioEl) {
                    calendarioEl.addEventListener(
                        "touchstart",
                        function (e) {
                            const touch = e.changedTouches[0];
                            touchStartX = touch.clientX;
                            touchStartY = touch.clientY;
                        },
                        { passive: true },
                    );

                    calendarioEl.addEventListener(
                        "touchend",
                        function (e) {
                            const touch = e.changedTouches[0];

                            const deltaX = touch.clientX - touchStartX;
                            const deltaY = touch.clientY - touchStartY;

                            const threshold = calendarioEl.clientWidth * 0.18;

                            if (Math.abs(deltaY) > Math.abs(deltaX)) return;

                            if (deltaX > threshold) mesAnterior();
                            else if (deltaX < -threshold) proximoMes();
                        },
                        { passive: true },
                    );
                }
            });

            function irParaHoje() {
                const agora = new Date();
                anoAtual = agora.getFullYear();
                mesAtual = agora.getMonth();
                document.getElementById("btnHoje").innerText = agora.getDate();
                gerarCalendario(anoAtual, mesAtual);
            }

            let baseFolgaDomingo;

            /* ===== FERIADOS FIXOS ===== */
            /* (mantido exatamente igual ao original) */

            // ✅ Feriados movidos para js/logic/feriados.js
            // As funções abaixo são expostas pelo main.js via window para compatibilidade
            // com o código legado de gerarCalendario() no index.html

            const prioridadeEventos = ["vacation", "folga", "holiday", "cultural", "birthday", "trabalho"];

            function listarFeriadosDoMes(ano, mes, lista) {
                const listaDiv = document.getElementById("listaFeriados");
                listaDiv.innerHTML = "";

                const feriadosDoMes = lista.filter((f) => f.mes === mes).sort((a, b) => a.dia - b.dia);

                feriadosDoMes.forEach((f) => {
                    const div = document.createElement("div");
                    div.innerText =
                        `${String(f.dia).padStart(2, "0")}/` + `${String(f.mes + 1).padStart(2, "0")} – ${f.nome}`;
                    listaDiv.appendChild(div);
                });
            }

            function gerarCalendario(ano, mes) {
                const mesEl = document.getElementById("mesTexto");
                const anoEl = document.getElementById("anoTexto");

                mesEl.textContent = mesesAbreviados[mes];
                anoEl.textContent = ano;

                const legend = document.getElementById("birthdayLegend");

                if (mes === 6) {
                    legend.style.display = "block";
                } else {
                    legend.style.display = "none";
                }

                const vacationLegend = document.getElementById("vacationLegend");

                const inicioMes = new Date(ano, mes, 1);
                const fimMes = new Date(ano, mes + 1, 0);

                const temFeriasNoMes = vacations.some((v) => {
                    const inicio = new Date(v.start);
                    const fim = new Date(v.end);

                    return inicio <= fimMes && fim >= inicioMes;
                });

                vacationLegend.style.display = temFeriasNoMes ? "block" : "none";

                const calendario = document.getElementById("calendario");
                // Início da microtransição
                calendario.classList.remove("calendar-transition-active");
                calendario.classList.add("calendar-transition");
                calendario.innerHTML = "";

                const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

                diasSemana.forEach((d) => {
                    const el = document.createElement("div");
                    el.className = "header-day";
                    el.innerText = d;
                    calendario.appendChild(el);
                });

                const primeiroDia = new Date(ano, mes, 1);
                const inicio = primeiroDia.getDay();
                const agora = new Date();
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();

                const ctx = getContext(ano);
                ctx.shiftSwaps = shiftSwaps;
                const todosFeriados = ctx.todosFeriados;
                const carnaval = ctx.carnaval;

                for (let i = 0; i < inicio; i++) {
                    calendario.appendChild(document.createElement("div"));
                }

                // Monta estrutura de dados do mês antes de renderizar
                calendar = {
                    year: ano,
                    month: mes,
                    days: Array.from({ length: diasNoMes }, (_, i) => {
                        const data = new Date(ano, mes, i + 1);
                        const dateStr = `${ano}-${String(mes + 1).padStart(2, "0")}-${String(i + 1).padStart(2, "0")}`;

                        const eventos = getEventos(data);

                        // Garante que sempre há pelo menos o layer base de trabalho
                        if (eventos.length === 0) {
                            eventos.push("trabalho");
                        }

                        const layers = buildLayers(eventos);
                        return { date: dateStr, layers };
                    }),
                };

                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const data = new Date(ano, mes, dia);
                    const el = document.createElement("div");
                    el.className = "day";

                    const span = document.createElement("span");
                    span.innerText = dia;
                    el.appendChild(span);

                    const { layers } = calendar.days[dia - 1];
                    const top = getTopLayer(layers);

                    if (top?.type && typeof top.type === "string") {
                        el.classList.add(top.type.replace(/\s+/g, "-"));
                    }

                    if (layers.some((l) => l.type === "birthday")) {
                        el.classList.add("birthday");
                    }

                    if (layers.length) {
                        el.dataset.layers = JSON.stringify(layers);
                    }

                    if (dia === agora.getDate() && mes === agora.getMonth() && ano === agora.getFullYear()) {
                        el.classList.add("today");
                    }

                    calendario.appendChild(el);
                }

                listarFeriadosDoMes(ano, mes, [...todosFeriados, ...carnaval]);
                // Ativar microtransição
                void calendario.offsetWidth;
                calendario.classList.add("calendar-transition-active");

            function proximoMes() {

                    anoAtual++;

            }

            function mesAnterior() {
                mesAtual--;
                if (mesAtual < 0) {

                    anoAtual--;
                }
                gerarCalendario(anoAtual, mesAtual);

            function renderMonthPicker() {
                const sheet = document.getElementById("pickerSheet");

                sheet.innerHTML = "";

                const handle = document.createElement("div");
                handle.className = "picker-handle";
                sheet.appendChild(handle);

                const grid = document.createElement("div");
                grid.className = "month-grid";

                mesesAbreviados.forEach((mes, index) => {
                    const item = document.createElement("div");
                    item.className = "month-item";
                    item.innerText = mes;

                    if (index === mesAtual) {
                        item.classList.add("active");
                    }

                    item.addEventListener("click", () => {
                        sheet.querySelectorAll(".month-item.active").forEach((el) => {

                        setTimeout(() => {

            function renderYearPicker() {
                const sheet = document.getElementById("pickerSheet");

                sheet.innerHTML = "";

                const handle = document.createElement("div");
                handle.className = "picker-handle";
                sheet.appendChild(handle);

                if (yearBlockStart === undefined) {
                    yearBlockStart = Math.floor(anoAtual / 12) * 12;
                }

                const startYear = yearBlockStart;

                const header = document.createElement("div");
                header.style.display = "flex";
                header.style.justifyContent = "space-between";
                header.style.alignItems = "center";
                header.style.marginBottom = "10px";

                const prev = document.createElement("div");
                prev.innerText = "◀";
                prev.style.cursor = "pointer";
                prev.style.padding = "6px";

                const title = document.createElement("div");
                title.innerText = `${startYear} - ${startYear + 11}`;
                title.style.fontWeight = "600";

                const next = document.createElement("div");
                next.innerText = "▶";
                next.style.cursor = "pointer";
                next.style.padding = "6px";

                header.appendChild(prev);
                header.appendChild(title);
                header.appendChild(next);

                sheet.appendChild(header);

                prev.addEventListener("click", () => {
                    yearBlockStart -= 12;
                    renderYearPicker();
                });

                next.addEventListener("click", () => {
                    yearBlockStart += 12;
                    renderYearPicker();
                });

                const grid = document.createElement("div");
                grid.className = "month-grid";

                for (let i = 0; i < 12; i++) {
                    const year = startYear + i;

                    const item = document.createElement("div");
                    item.className = "month-item";
                    item.innerText = year;

                    if (year === anoAtual) {
                        item.classList.add("active");
                    }

                    item.addEventListener("click", () => {
                        item.classList.add("active");

                        setTimeout(() => {
                            anoAtual = year;
                            yearBlockStart = undefined;
                            gerarCalendario(anoAtual, mesAtual);
                            closePicker();
                        }, 120);
                    });

                    grid.appendChild(item);
                }

                sheet.appendChild(grid);

                let startX = 0;

                sheet.ontouchstart = (e) => {
                    startX = e.changedTouches[0].clientX;
                };

                sheet.ontouchend = (e) => {
                    const deltaX = e.changedTouches[0].clientX - startX;

                    const threshold = sheet.clientWidth * 0.18;

                    if (deltaX > threshold) {
                        yearBlockStart -= 12;
                        renderYearPicker();
                    } else if (deltaX < -threshold) {
                        yearBlockStart += 12;
                        renderYearPicker();
                    }
                };
            }

                    case "ArrowRight":
                        proximoMes();

                    case "ArrowDown":

            function atualizarFooterBase() {
                const el = document.getElementById("footerBase");
                const user = window.loadUser();
                const area = normalizeArea(user.profile.area);
                const isPlantao = AREAS_WITHOUT_DSR.includes(area);

                const partes = [];

                if (isPlantao) {
                    // Áreas de plantão: infoEscala já mostra "Escala: 24x72 • Hoje: ..."
                    // footerBase não repete essa info
                } else {
                    // Áreas semanais: mantém lógica original

                    // 📅 PRÓXIMA FOLGA DOMINGO
                    if (user.settings.base_date) {
                        const hoje = new Date();
                        hoje.setHours(0, 0, 0, 0);

                        const [by, bm, bd] = user.settings.base_date.split("-").map(Number);
                        const base = new Date(by, bm - 1, bd);
                        base.setHours(0, 0, 0, 0);

                        const proxima = new Date(base);
                        while (proxima < hoje) {
                            proxima.setDate(proxima.getDate() + 21);
                        }

                        const d = String(proxima.getDate()).padStart(2, "0");
                        const m = String(proxima.getMonth() + 1).padStart(2, "0");
                        const y = proxima.getFullYear();

                        const diff = Math.round((proxima - hoje) / 86400000);
                        const label = diff === 0 ? "hoje!" : `em ${diff} dia${diff === 1 ? "" : "s"}`;

                        partes.push(`🌙 Folga Dom: ${d}/${m}/${y} (${label})`);
                    }

                    // 📆 DSR
                    const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
                    const dsr = Number(user.settings.dsr ?? 0);
                    partes.push(`DSR: ${diasSemana[dsr]}`);
                }

                // 🎂 ANIVERSÁRIO (todas as áreas)
                if (user.profile.birthday) {
                    const [y, m, d] = user.profile.birthday.split("-");
                    partes.push(`🎂 ${d}/${m}`);
                }

                // 🏖️ DIAS PARA AS FÉRIAS (todas as áreas)
                if (window.getProximaFerias) {
                    const proxima = window.getProximaFerias(vacations);
                    if (proxima) {
                        const dias = calcularDiasRestantes(proxima.start);
                        if (dias > 0) {
                            partes.push(`🏖️ Férias em ${dias} dia${dias === 1 ? "" : "s"}`);
                        } else if (dias === 0) {
                            partes.push(`🏖️ Férias hoje!`);
                        }
                    }
                }

                // 📆 DIA DO ANO (todas as áreas)
                const hoje = new Date();
                const inicioAno = new Date(hoje.getFullYear(), 0, 1);
                const fimAno = new Date(hoje.getFullYear(), 11, 31);
                const diaDoAno = Math.ceil((hoje - inicioAno) / 86400000) + 1;
                const diasNoAno = Math.ceil((fimAno - inicioAno) / 86400000) + 1;
                const faltam = diasNoAno - diaDoAno;
                partes.push(`Dia ${diaDoAno} de ${diasNoAno} • Faltam ${faltam}`);

                el.innerText = partes.join(" | ");
            }

            // ==============================
            // registrarEscalaNoHistorico()
            // Chamado antes de salvar — compara escala nova com a última
            // entrada do histórico e só registra se houve mudança real.
            // ==============================
            function registrarEscalaNoHistorico(user, novaBaseDate, novoPattern, novoType) {
                if (!novaBaseDate || !novoPattern) return;

                if (!Array.isArray(user.scale_history)) {
                    user.scale_history = [];
                }

                const ultima = user.scale_history[user.scale_history.length - 1];

                const mudou =
                    !ultima ||
                    ultima.pattern !== novoPattern ||
                    ultima.type !== novoType ||
                    ultima.base_date !== novaBaseDate;

                if (mudou) {
                    // "since" = hoje (data em que a nova escala entra em vigor)
                    const hoje = new Date();
                    const since =
                        hoje.getFullYear() +
                        "-" +
                        String(hoje.getMonth() + 1).padStart(2, "0") +
                        "-" +
                        String(hoje.getDate()).padStart(2, "0");

                    user.scale_history.push({
                        pattern: novoPattern,
                        type: novoType,
                        base_date: novaBaseDate,
                        since,
                    });
                }
            }

                const label = isPlantao ? "Escala" : config.escala;

            function calcularDiasRestantes(dataInicio) {
                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);

                const inicio = new Date(dataInicio);
                inicio.setHours(0, 0, 0, 0);

                const diff = inicio - hoje;

                const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));

                return dias;
            }

            function renderHistoricoSwaps() {
                const lista = document.getElementById("historicoSwapList");

                if (shiftSwaps.length === 0) {

                }

                const sorted = [...shiftSwaps].sort((a, b) => (a.from > b.from ? -1 : 1));

                lista.innerHTML = sorted
                    .map((s, i) => {
                        const fromLabel = s.from.split("-").reverse().join("/");
                        const toLabel = s.to.split("-").reverse().join("/");
                        const nota = s.note
                            ? `<div style="font-size:0.8em;color:var(--text-muted,#888)">${s.note}</div>`
                            : "";

                        return `

                    .join("");

                lista.querySelectorAll(".btn-remover[data-swap-id]").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const id = btn.dataset.swapId;
                        shiftSwaps = shiftSwaps.filter((s) => s.id !== id);
                        await salvarShiftSwaps();
                        gerarCalendario(anoAtual, mesAtual);
                        renderHistoricoSwaps();
                    });
                });
            }

            // Wiring do formulário de trocas
            function wireSwap() {
                const btn = document.getElementById("btnConfirmarSwap");
                if (!btn || btn._swapWired) return;
                btn._swapWired = true;

                btn.addEventListener("click", async () => {
                    const from = document.getElementById("swapFrom").value;
                    const to = document.getElementById("swapTo").value;
                    const note = document.getElementById("swapNote").value.trim();

                    if (!from || !to) {
                        showToast("Informe as duas datas.", "error");
                        return;
                    }

                    if (from === to) {
                        showToast("As datas precisam ser diferentes.", "error");
                        return;
                    }

                    const existe = shiftSwaps.some((s) => s.from === from && s.to === to);
                    if (existe) {
                        showToast("Troca já registrada.", "error");
                        return;
                    }

                    shiftSwaps.push({
                        id: crypto.randomUUID(),
                        from,
                        to,
                        note,
                        created_at: new Date().toISOString(),
                    });

                    await salvarShiftSwaps();
                    gerarCalendario(anoAtual, mesAtual);
                    renderHistoricoSwaps();

                    document.getElementById("swapFrom").value = "";
                    document.getElementById("swapTo").value = "";
                    document.getElementById("swapNote").value = "";

                    showToast("Troca registrada!", "success");
                });
            }

            // Wiring do modal de histórico
            function wireHistorico() {
                const btnH = document.getElementById("btnHistorico");
                if (!btnH || btnH._historicoWired) return;
                btnH._historicoWired = true;

                // Preenche selects de mês e ano
                const mesesNomes = [
                    "Janeiro",
                    "Fevereiro",
                    "Março",
                    "Abril",
                    "Maio",
                    "Junho",
                    "Julho",
                    "Agosto",
                    "Setembro",
                    "Outubro",
                    "Novembro",
                    "Dezembro",
                ];
                const selMes = document.getElementById("historicoMesSelect");
                const selAno = document.getElementById("historicoAnoSelect");

                mesesNomes.forEach((nome, i) => {
                    const opt = document.createElement("option");
                    opt.value = String(i + 1).padStart(2, "0");
                    opt.textContent = nome;
                    selMes.appendChild(opt);
                });

                const anoBase = new Date().getFullYear();
                for (let a = anoBase - 3; a <= anoBase + 1; a++) {
                    const opt = document.createElement("option");
                    opt.value = a;
                    opt.textContent = a;
                    selAno.appendChild(opt);
                }

                // Pré-seleciona mês/ano atual
                const hoje = new Date();
                selMes.value = String(hoje.getMonth() + 1).padStart(2, "0");
                selAno.value = hoje.getFullYear();

                btnH.addEventListener("click", abrirHistorico);
                document.getElementById("historicoFechar").addEventListener("click", fecharHistorico);

                document.getElementById("historicoMesBuscar").addEventListener("click", () => {
                    const mes = document.getElementById("historicoMesSelect").value;
                    const ano = document.getElementById("historicoAnoSelect").value;
                    renderHistoricoPlantoes(`${ano}-${mes}`);
                });
            }

            // Dispara pelo evento do módulo ou pelo DOMContentLoaded (fallback)
            window.addEventListener("cyclecal:ready", wireHistorico);
            document.addEventListener("DOMContentLoaded", wireHistorico);
        </script>
