<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CycleCal</title>

        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#2FAF8A" />

        <link rel="icon" href="icon-256.png" type="image/png" />

        <!-- Versão 1.9.0.1 -->

        <style>
            :root {
                --birthday-color: #d4af37;
            }

            body {
                font-family: Arial, sans-serif;
                background: #f5f7f6;
                margin: 0;
                padding: 20px;
            }

            .container {
                max-width: 500px;
                margin: auto;
                background: white;
                padding: 20px;
                border-radius: 16px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo {
                width: 40px;
                height: 40px;
            }

            h1 {
                margin: 0;
                font-size: 26px;
            }

            .version {
                font-size: 12px;
                color: gray;
                margin-left: 6px;
            }

            .title-group {
                display: flex;
                flex-direction: column;
            }

            .title-line {
                display: flex;
                align-items: baseline;
                gap: 6px;
            }

            .btn-hoje {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                border: none;
                background: black;
                color: white;
                font-weight: bold;
                font-size: 14px;
                cursor: pointer;

                display: flex;
                align-items: center;
                justify-content: center;

                padding: 0;
                line-height: 1;
            }

            .line {
                margin: 15px 0;
                border-bottom: 2px solid #eee;
            }

            .controls {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            button {
                padding: 6px 12px;
                font-size: 16px;
            }

            .controls button {
                min-height: 44px;
                width: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .calendar {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
            }

            .day,
            .header-day {
                text-align: center;
                padding: 12px 0;
                border-radius: 8px;
            }

            .header-day {
                font-weight: bold;
                background: #f0f0f0;
            }

            .day {
                background: #fafafa;
                border: 1px solid #eee;
                position: relative;
            }

            .day.birthday {
                border: 2px solid var(--birthday-color);
            }

            .day.birthday::after {
                content: "🎂";
                position: absolute;
                bottom: 4px;
                right: 4px;
                font-size: 12px;
            }

            .day.folga {
                background: #e6f7f1;
                border: 2px solid #2faf8a;
            }

            .day.holiday {
                background: #ffeaea;
                border: 2px solid #c62828;
            }

            .day.cultural {
                background: #f3e8ff;
                border: 2px solid #8e44ad;
            }

            .day.vacation {
                background: repeating-linear-gradient(45deg, #f5f5f5, #f5f5f5 4px, #e0e0e0 4px, #e0e0e0 8px);
                border: 2px solid #9e9e9e;
            }

            .day.today span {
                display: inline-block;
                width: 28px;
                height: 28px;
                line-height: 28px;
                border-radius: 50%;
                background: black;
                color: white;
                font-weight: bold;
            }

            .footer {
                margin-top: 20px;
                font-size: 12px;
                color: gray;
            }

            .legend {
                margin-top: 8px;
                color: #444;
                display: none;
            }

            .legend-box {
                display: inline-block;
                width: 14px;
                height: 14px;
                border-radius: 3px;
                margin-right: 6px;
                vertical-align: middle;
            }

            .legend-box.vacation {
                background: repeating-linear-gradient(45deg, #f5f5f5, #f5f5f5 4px, #e0e0e0 4px, #e0e0e0 8px);
                border: 1px solid #9e9e9e;
            }

            .footer .holidays {
                margin-top: 10px;
                color: #444;
            }

            #controle-folgas {
                font-size: 12px;
                color: gray;
                margin-top: 2px;
            }

            .calendar-transition {
                opacity: 0;
                transform: translateY(4px);
            }

            .calendar-transition-active {
                transition:
                    opacity 140ms ease-out,
                    transform 140ms ease-out;
                opacity: 1;
                transform: translateY(0);
            }

            .periodo {
                flex: 1;
                min-height: 44px;
                padding: 0 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                font-size: 1.1rem;
                cursor: pointer;
                user-select: none;
                border-radius: 8px;
                transition:
                    background 0.15s ease,
                    transform 0.08s ease;
            }

            .periodo:active {
                transform: scale(0.97);
            }

            @media (hover: hover) {
                .periodo:hover {
                    background: rgba(0, 0, 0, 0.05);
                }
            }

            /* Bottom Sheet Overlay (base) */
            #pickerOverlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.35);
                display: flex;
                justify-content: center;
                align-items: flex-end;
                z-index: 100;
            }

            #pickerOverlay[hidden] {
                display: none !important;
            }

            /* Bottom Sheet (visual + animação) */
            .picker-sheet {
                width: 100%;
                max-width: 500px;
                background: #ffffff;
                border-radius: 16px 16px 0 0;
                padding: 20px;

                /* Estado inicial (fechado) */
                transform: translateY(100%);
                transition: transform 220ms cubic-bezier(0.22, 0.61, 0.36, 1);
            }

            .picker-handle {
                width: 36px;
                height: 4px;
                background: #d0d0d0;
                border-radius: 3px;
                margin: 0 auto 12px auto;
            }

            .month-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-top: 10px;
            }

            .month-item {
                padding: 12px;
                text-align: center;
                border-radius: 8px;
                background: #f3f4f4;
                font-weight: 600;
                border: 1px solid #e6e6e6;
            }

            .month-item.active {
                background: #2faf8a;
                color: white;
            }

            /* Quando estiver ativo */
            #pickerOverlay.active .picker-sheet {
                transform: translateY(0);
            }

            #anoTexto {
                margin-left: 6px;
            }

            #mesTexto,
            #anoTexto {
                cursor: pointer;
            }

            .periodo span {
                padding: 4px 2px;
            }

            .day span {
                position: relative;
                z-index: 1;
            }

            .day.birthday::after {
                z-index: 2;
            }

            .setup-modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.35);

                justify-content: center;
                align-items: flex-start;

                z-index: 9999;
                padding: 10px;
            }

            .setup-box {
                background: #1e293b;
                padding: 24px;
                border-radius: 16px;

                width: 100%;
                max-width: 420px;
                max-height: 90vh;

                display: flex;
                flex-direction: column;

                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                color: #e2e8f0;
            }

            .setup-box label {
                font-size: 12px;
                color: #94a3b8;
                display: block;
                margin-top: 10px;
                margin-bottom: 4px;
            }

            .setup-box input,
            .setup-box select {
                width: 100%;
                padding: 8px 10px;
                border-radius: 8px;
                border: 1px solid #334155;
                background: #0f172a;
                color: #e2e8f0;
            }

            .setup-box input:focus,
            .setup-box select:focus {
                outline: none;
                border-color: #3b82f6;
            }

            .setup-box button {
                width: 100%;
                padding: 10px;
                border-radius: 10px;
                border: none;
                margin-top: 10px;
                cursor: pointer;
                font-weight: 500;
            }

            .setup-section {
                margin-top: 20px;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 14px;
                position: relative;
            }

            .setup-section h4 {
                position: absolute;
                top: -8px;
                left: 10px;
                background: #1e293b; /* mesma cor do card */
                padding: 0 6px;

                font-size: 11px;
                color: #94a3b8;
            }

            #setupSalvar {
                background: #3b82f6;
                color: white;
            }

            #setupFechar {
                background: #334155;
                color: #e2e8f0;
            }

            .setup-box h3 {
                margin-top: 0;
                margin-bottom: 10px;
                font-size: 18px;
            }

            .setup-title {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 12px;
            }

            .setup-icon {
                width: 18px;
                height: 18px;
            }

            .setup-box h3 {
                margin: 0;
                font-size: 16px;
            }

            .setup-section {
                margin-top: 20px;
            }

            .setup-section h4 {
                font-size: 12px;
                color: #cbd5f5;
                margin-bottom: 8px;
                margin-top: 4px;
            }

            .setup-section:first-of-type {
                margin-top: 10px;
            }

            * {
                box-sizing: border-box;
            }

            .toast {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);

                background: #1e293b;
                color: #e2e8f0;

                padding: 12px 16px;
                border-radius: 10px;

                font-size: 14px;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);

                opacity: 0;
                transition: all 0.2s ease;

                z-index: 9999;
            }

            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .toast.error {
                background: #7f1d1d;
            }

            .toast.success {
                background: #065f46;
            }

            @media (max-width: 480px) {
                .setup-modal {
                    padding: 0;
                }

                .setup-box {
                    max-width: 100%;
                    max-height: 100vh;
                    height: 100%;
                    border-radius: 0;
                }
            }

            .setup-footer {
                position: sticky;
                bottom: 0;
                background: #1e293b;
                padding: 12px;
                display: flex;
                gap: 10px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .setup-footer button {
                flex: 1;
            }

            .ferias-row {
                display: flex;
                gap: 10px;
            }

            .ferias-row > div {
                flex: 1;
            }

            .ferias-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;

                background: rgba(255, 255, 255, 0.05);
                padding: 10px;
                border-radius: 8px;
                margin-top: 8px;
            }

            .ferias-item span {
                flex: 1;
                white-space: nowrap;
            }

            .btn-remover {
                background: transparent;
                border: 1px solid #ff5c5c;
                color: #ff5c5c;

                padding: 4px 8px;
                font-size: 12px;

                border-radius: 6px;
                cursor: pointer;

                transition: 0.2s;

                width: auto !important;
                margin-top: 0 !important;
                flex-shrink: 0;
                align-self: center;
            }

            .btn-remover:hover {
                background: #ff5c5c;
                color: white;
            }

            .setup-box .ferias-item .btn-remover {
                width: auto;
                margin-top: 0;
                padding: 4px 8px;
                flex-shrink: 0;
                align-self: center;
            }

            #feriasForm {
                max-height: 0;
                overflow: hidden;

                opacity: 0;
                transform: translateY(-4px);

                transition: all 0.25s ease;
            }

            #feriasForm.active {
                max-height: 1000px;

                opacity: 1;
                transform: translateY(0);
            }

            #setupSalvarFeriasBtn.active {
                background: #22c55e;
                color: white;
            }

            #btnCancelarFerias {
                background: #334155;
                color: #e2e8f0;
                margin-top: 8px;
                opacity: 0.9;
            }

            #btnCancelarFerias:hover {
                opacity: 1;
            }

            .ferias-actions {
                display: flex;
                gap: 10px;
                margin-top: 10px;
            }

            .ferias-actions button {
                flex: 1;
                width: auto !important;
            }

            .setup-content {
                overflow-y: auto;
                flex: 1;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <img src="icon-256.png" class="logo" />

                    <div class="title-group">
                        <div class="title-line">
                            <h1>CycleCal</h1>
                            <span class="version">v1.9.0.1</span>
                        </div>

                        <div id="userGreeting"></div>

                        <div id="controle-folgas">Controle de Escalas e Folgas</div>
                    </div>
                </div>

                <button class="btn-hoje" id="btnHoje" onclick="irParaHoje()"></button>
            </div>

            <div class="line"></div>

            <div class="controls">
                <button onclick="mesAnterior()">◀</button>

                <div class="periodo">
                    <span id="mesTexto"></span>
                    <span id="anoTexto"></span>
                </div>

                <button onclick="proximoMes()">▶</button>
            </div>

            <div class="calendar" id="calendario"></div>

            <div style="margin-top: 15px; text-align: center">
                <button id="btnSetup">Setup ⚙</button>
            </div>

            <div class="footer">
                <div id="infoEscala"></div>
                <div id="footerBase"></div>

                <div class="legend" id="birthdayLegend">🎂 Aniversário</div>

                <div class="legend" id="vacationLegend"><span class="legend-box vacation"></span> Férias</div>

                <div class="holidays" id="listaFeriados"></div>
            </div>
        </div>


        <script>
            const AREAS = [
                { value: "supermercado", label: "Supermercado / Varejo" },
                { value: "seguranca", label: "Segurança Pública" },
                { value: "hospital", label: "Hospital / Saúde" },
                { value: "industria", label: "Indústria" },
                { value: "outros", label: "Outros" },
            ];

            const AREA_PRESETS = {
                seguranca: {
                    scale_type: "plantao",
                    scale_pattern: "24x72",
                },
                hospital: {
                    scale_type: "plantao",
                    scale_pattern: "12x36",
                },
                supermercado: {
                    scale_type: "semanal",
                    scale_pattern: "6x1",
                },
                industria: {
                    scale_type: "turno",
                    scale_pattern: "5x1",
                },
            };

            const AREAS_WITHOUT_DSR = ["seguranca", "hospital"];

            const AREA_CONFIG = {
                seguranca: {
                    trabalho: "Bom plantão 👮‍♂️",
                    folga: "Bom descanso",
                    escala: "Plantão",
                    folgaLabel: "Descanso",
                },
                hospital: {
                    trabalho: "Bom plantão 🏥",
                    folga: "Bom descanso",
                    escala: "Plantão",
                    folgaLabel: "Descanso",
                },
                supermercado: {
                    trabalho: "Bom trabalho",
                    folga: "Boa folga",
                    escala: "Turno",
                    folgaLabel: "Folga",
                },
                industria: {},
                outros: {},
            };

            const mesesAbreviados = [
                "JAN",
                "FEV",
                "MAR",
                "ABR",
                "MAI",
                "JUN",
                "JUL",
                "AGO",
                "SET",
                "OUT",
                "NOV",
                "DEZ",
            ];

            let anoAtual;
            let mesAtual;
            let yearBlockStart;
            let vacations = [];
            let userModifiedScale = false;
            let isApplyingPreset = false;
            let feriasFormAberto = false;

            function getSetupModal() {
                return document.getElementById("setupModal");
            }

            function initUser() {
                const stored = localStorage.getItem("cyclecal_user");

                if (!stored) {
                    const user = {
                        version: 1,
                        updated_at: "",
                        profile: {
                            user_id: crypto.randomUUID(),
                            name: "",
                            area: "",
                            birthday: "",
                            created_at: new Date().toISOString(),
                        },
                        settings: {
                            base_date: "",
                            scale_type: "",
                            scale_pattern: "",
                            dsr: 0,
                        },
                        vacations: [],
                    };

                    localStorage.setItem("cyclecal_user", JSON.stringify(user));
                }
            }

            function getUser() {
                try {
                    return JSON.parse(localStorage.getItem("cyclecal_user"));
                } catch {
                    return null;
                }
            }

            function saveUser(user) {
                user.updated_at = new Date().toISOString();
                localStorage.setItem("cyclecal_user", JSON.stringify(user));
            }

            function renderAreaSelect() {
                const select = document.getElementById("areaSelect");

                if (!select) return;

                select.innerHTML = "";

                AREAS.forEach((area) => {
                    const option = document.createElement("option");
                    option.value = area.value;
                    option.textContent = area.label;
                    select.appendChild(option);
                });

                const user = getUser();
                select.value = user.profile.area || "outros";
            }

            function applyAreaPreset(area) {
                if (userModifiedScale) return;

                const preset = AREA_PRESETS[area];
                if (!preset) return;

                isApplyingPreset = true;

                document.getElementById("setupScaleType").value = preset.scale_type;
                document.getElementById("setupScalePattern").value = preset.scale_pattern;

                // 🔥 SALVAR NO USER
                const user = getUser();
                user.settings.scale_type = preset.scale_type;
                user.settings.scale_pattern = preset.scale_pattern;
                //saveUser(user);
                //showToast("Salvo com sucesso!", "success");

                isApplyingPreset = false;
            }

            function getBaseDate() {
                const user = getUser();

                if (user.settings.base_date) {
                    return new Date(user.settings.base_date);
                }

                // fallback padrão atual
                return new Date(2026, 1, 15);
            }

            function setBaseDate(dateStr) {
                const user = getUser();

                user.settings.base_date = dateStr;

                saveUser(user);

                baseFolgaDomingo = new Date(dateStr);

                gerarCalendario(anoAtual, mesAtual);
            }

            function alterarBaseDate() {
                const novaData = prompt("Informe a nova data base (AAAA-MM-DD):");

                if (!novaData) return;

                setBaseDate(novaData);
            }

            function setScaleType(type) {
                const user = getUser();

                user.settings.scale_type = type;

                saveUser(user);
            }

            function alterarTipoEscala() {
                const tipo = prompt("Tipo de escala (ex: semanal, plantao)");

                if (!tipo) return;

                setScaleType(tipo);
            }

            function setScalePattern(pattern) {
                const user = getUser();

                user.settings.scale_pattern = pattern;

                saveUser(user);
            }

            function alterarPadraoEscala() {
                const pattern = prompt("Padrão da escala (ex: 7, 5x1, 12x36)");

                if (!pattern) return;

                setScalePattern(pattern);
            }

            function salvarFerias() {
                const user = getUser();
                user.vacations = vacations;
                saveUser(user);
            }

            function carregarFerias() {
                const user = getUser();

                if (!user) {
                    vacations = [];
                    return;
                }

                vacations = user.vacations || [];
            }

            document.addEventListener("DOMContentLoaded", function () {
                initUser();

                carregarFerias();

                preencherSetup();
                verificarPerfil();
                atualizarSaudacao();
                atualizarFooterBase();
                atualizarInfoEscala();
                agendarAtualizacaoDiaria();

                // 🔥 ATIVA SALVAR AO MODIFICAR
                document.getElementById("setupUserName").addEventListener("input", ativarSalvar);
                document.getElementById("setupBirthday").addEventListener("input", ativarSalvar);
                document.getElementById("setupBaseDate").addEventListener("input", ativarSalvar);
                document.getElementById("setupScaleType").addEventListener("input", ativarSalvar);
                document.getElementById("setupScalePattern").addEventListener("input", ativarSalvar);

                document.getElementById("areaSelect").addEventListener("change", ativarSalvar);
                document.getElementById("setupDSR").addEventListener("change", ativarSalvar);

                const user = getUser();

                if (!user.profile.area) {
                    user.profile.area = "outros";
                    saveUser(user);
                }

                renderAreaSelect();

                const areaSelect = document.getElementById("areaSelect");

                areaSelect.addEventListener("change", (e) => {
                    const user = getUser();
                    const oldArea = user.profile.area;
                    const newArea = e.target.value;
                    user.profile.area = newArea;
                    //saveUser(user);

                    //userModifiedScale = false;
                    if (oldArea !== newArea) {
                        userModifiedScale = false;
                        applyAreaPreset(e.target.value);
                    }

                    const dsrField = document.getElementById("dsrWrapper");

                    if (AREAS_WITHOUT_DSR.includes(e.target.value)) {
                        dsrField.style.display = "none";
                        document.getElementById("setupDSR").value = "0";
                    } else {
                        dsrField.style.display = "";
                    }
                });

                document.getElementById("setupScaleType").addEventListener("input", () => {
                    if (isApplyingPreset) return;
                    userModifiedScale = true;
                });

                document.getElementById("setupScalePattern").addEventListener("input", () => {
                    if (isApplyingPreset) return;
                    userModifiedScale = true;
                });

                const birthdayInput = document.getElementById("setupBirthday");

                if (birthdayInput) {
                    birthdayInput.addEventListener("input", function (e) {
                        let v = e.target.value.replace(/\D/g, "");

                        if (v.length > 4) v = v.slice(0, 4);

                        if (v.length >= 3) {
                            v = v.slice(0, 2) + "/" + v.slice(2);
                        }

                        e.target.value = v;
                    });
                }

                baseFolgaDomingo = getBaseDate();

                const hoje = new Date();
                anoAtual = hoje.getFullYear();
                mesAtual = hoje.getMonth();

                gerarCalendario(anoAtual, mesAtual);
                document.getElementById("btnHoje").innerText = hoje.getDate();

                document.getElementById("btnSetup").onclick = function () {
                    //userModifiedScale = false;
                    mostrarSetup();
                };

                document.getElementById("setupFechar").onclick = function () {
                    preencherSetup(); // 🔥 garante reset total

                    getSetupModal().style.display = "none";
                    document.body.style.overflow = "";
                };

                document.getElementById("setupSalvar").onclick = function () {
                    const baseDate = document.getElementById("setupBaseDate").value;
                    const userName = document.getElementById("setupUserName").value;

                    const birthdayInput = document.getElementById("setupBirthday").value;

                    let birthday = "";

                    if (birthdayInput && birthdayInput.includes("/")) {
                        const [d, m] = birthdayInput.split("/");

                        if (!d || !m) {
                            showToast("Data incompleta.", "error");
                            return;
                        }

                        if (!isValidDate(d, m)) {
                            showToast("Data de aniversário inválida.", "error");
                            return;
                        }

                // ===== PICKER + SWIPE (UNIFICADO) =====

                function openPicker() {

                // SWIPE
                let touchStartX = 0;

                        { passive: true },

                    calendarioEl.addEventListener(
                        "touchend",
                        function (e) {
                            const touch = e.changedTouches[0];

                            const deltaX = touch.clientX - touchStartX;
                            const deltaY = touch.clientY - touchStartY;

                            const threshold = calendarioEl.clientWidth * 0.18;

                            if (Math.abs(deltaY) > Math.abs(deltaX)) return;

            function irParaHoje() {
                const agora = new Date();

            let baseFolgaDomingo;

            // com o código legado de gerarCalendario() no index.html

            const prioridadeEventos = ["vacation", "folga", "holiday", "cultural", "birthday"];

            function listarFeriadosDoMes(ano, mes, lista) {
                const listaDiv = document.getElementById("listaFeriados");
                listaDiv.innerHTML = "";

                const feriadosDoMes = lista.filter((f) => f.mes === mes).sort((a, b) => a.dia - b.dia);

                feriadosDoMes.forEach((f) => {
                    const div = document.createElement("div");
                    div.innerText =

            }

            function gerarCalendario(ano, mes) {
                const mesEl = document.getElementById("mesTexto");
                const anoEl = document.getElementById("anoTexto");

                mesEl.textContent = mesesAbreviados[mes];
                anoEl.textContent = ano;

                const legend = document.getElementById("birthdayLegend");

                if (mes === 6) {
                    legend.style.display = "block";
                } else {
                    legend.style.display = "none";
                }

                const vacationLegend = document.getElementById("vacationLegend");

                const inicioMes = new Date(ano, mes, 1);
                const fimMes = new Date(ano, mes + 1, 0);

                const temFeriasNoMes = vacations.some((v) => {
                    const inicio = new Date(v.start);
                    const fim = new Date(v.end);

                    return inicio <= fimMes && fim >= inicioMes;
                });

                vacationLegend.style.display = temFeriasNoMes ? "block" : "none";

                const calendario = document.getElementById("calendario");
                // Início da microtransição
                calendario.classList.remove("calendar-transition-active");
                calendario.classList.add("calendar-transition");
                calendario.innerHTML = "";

                const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

                diasSemana.forEach((d) => {
                    const el = document.createElement("div");
                    el.className = "header-day";
                    el.innerText = d;
                    calendario.appendChild(el);
                });

                const primeiroDia = new Date(ano, mes, 1);
                const inicio = primeiroDia.getDay();
                const agora = new Date();
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();

                const feriadosMoveis = gerarFeriadosMoveis(ano);
                const carnaval = gerarCarnaval(ano);

                const todosFeriados = [...feriadosFixos, ...feriadosMoveis];

                for (let i = 0; i < inicio; i++) {
                    calendario.appendChild(document.createElement("div"));
                }

                const user = getUser();

                let aniversario = null;

                if (user.profile.birthday) {
                    const [y, m, d] = user.profile.birthday.split("-");
                    aniversario = ajustarAniversario(Number(d), Number(m) - 1, ano);
                }

                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const data = new Date(ano, mes, dia);
                    const el = document.createElement("div");
                    el.className = "day";

                    const span = document.createElement("span");
                    span.innerText = dia;
                    el.appendChild(span);

                    const eventos = getEventos(data);
                    const principal = getEventoPrincipal(data);

                    if (principal) {
                        el.classList.add(principal);
                    }

                    if (eventos.includes("birthday")) {
                        el.classList.add("birthday");
                    }

                    if (dia === agora.getDate() && mes === agora.getMonth() && ano === agora.getFullYear()) {
                        el.classList.add("today");
                    }

                    calendario.appendChild(el);
                }

                listarFeriadosDoMes(ano, mes, [...todosFeriados, ...carnaval]);
                // Ativar microtransição
                void calendario.offsetWidth;
                calendario.classList.add("calendar-transition-active");
                calendario.classList.remove("calendar-transition");
            }

            function proximoMes() {
                mesAtual++;
                if (mesAtual > 11) {
                    mesAtual = 0;
                    anoAtual++;
                }
                gerarCalendario(anoAtual, mesAtual);
            }

            function mesAnterior() {
                mesAtual--;
                if (mesAtual < 0) {
                    mesAtual = 11;
                    anoAtual--;
                }
                gerarCalendario(anoAtual, mesAtual);
            }

            function renderMonthPicker() {
                const sheet = document.getElementById("pickerSheet");

                sheet.innerHTML = "";

                const handle = document.createElement("div");
                handle.className = "picker-handle";
                sheet.appendChild(handle);

                const grid = document.createElement("div");
                grid.className = "month-grid";

                mesesAbreviados.forEach((mes, index) => {
                    const item = document.createElement("div");
                    item.className = "month-item";
                    item.innerText = mes;

                    if (index === mesAtual) {
                        item.classList.add("active");
                    }

                    item.addEventListener("click", () => {
                        sheet.querySelectorAll(".month-item.active").forEach((el) => {
                            el.classList.remove("active");
                        });
                        item.classList.add("active");

                        setTimeout(() => {
                            mesAtual = index;
                            gerarCalendario(anoAtual, mesAtual);
                            closePicker();
                        }, 120);
                    });

                    grid.appendChild(item);
                });

                sheet.appendChild(grid);
            }

            function renderYearPicker() {
                const sheet = document.getElementById("pickerSheet");

                sheet.innerHTML = "";

                const handle = document.createElement("div");
                handle.className = "picker-handle";
                sheet.appendChild(handle);

                if (yearBlockStart === undefined) {
                    yearBlockStart = Math.floor(anoAtual / 12) * 12;
                }

                const startYear = yearBlockStart;

                const header = document.createElement("div");
                header.style.display = "flex";
                header.style.justifyContent = "space-between";
                header.style.alignItems = "center";
                header.style.marginBottom = "10px";

                const prev = document.createElement("div");
                prev.innerText = "◀";
                prev.style.cursor = "pointer";
                prev.style.padding = "6px";

                const title = document.createElement("div");
                title.innerText = `${startYear} - ${startYear + 11}`;
                title.style.fontWeight = "600";

                const next = document.createElement("div");
                next.innerText = "▶";
                next.style.cursor = "pointer";
                next.style.padding = "6px";

                header.appendChild(prev);
                header.appendChild(title);
                header.appendChild(next);

                sheet.appendChild(header);

                prev.addEventListener("click", () => {
                    yearBlockStart -= 12;
                    renderYearPicker();
                });

                next.addEventListener("click", () => {
                    yearBlockStart += 12;
                    renderYearPicker();
                });

                const grid = document.createElement("div");
                grid.className = "month-grid";

                for (let i = 0; i < 12; i++) {
                    const year = startYear + i;

                    const item = document.createElement("div");
                    item.className = "month-item";
                    item.innerText = year;

                    if (year === anoAtual) {
                        item.classList.add("active");
                    }

                    item.addEventListener("click", () => {
                        item.classList.add("active");

                        setTimeout(() => {
                            anoAtual = year;
                            yearBlockStart = undefined;
                            gerarCalendario(anoAtual, mesAtual);
                            closePicker();
                        }, 120);
                    });

                    grid.appendChild(item);
                }

                sheet.appendChild(grid);

                let startX = 0;

                sheet.ontouchstart = (e) => {
                    startX = e.changedTouches[0].clientX;
                };

                sheet.ontouchend = (e) => {
                    const deltaX = e.changedTouches[0].clientX - startX;

                    const threshold = sheet.clientWidth * 0.18;

                    if (deltaX > threshold) {
                        yearBlockStart -= 12;
                        renderYearPicker();
                    } else if (deltaX < -threshold) {
                        yearBlockStart += 12;
                        renderYearPicker();
                    }
                };
            }

            /* ===== KEYBOARD NAVIGATION v1.3.5 ===== */

            document.addEventListener("keydown", function (e) {
                if (e.target.tagName === "INPUT") return;

                switch (e.key) {
                    case "ArrowLeft":
                        mesAnterior();
                        break;

                    case "ArrowRight":
                        proximoMes();
                        break;

                    case "ArrowUp":
                        anoAtual--;
                        gerarCalendario(anoAtual, mesAtual);
                        break;

                    case "ArrowDown":
                        anoAtual++;
                        gerarCalendario(anoAtual, mesAtual);
                        break;

                    case "PageUp":
                        e.preventDefault();
                        mesAnterior();
                        break;

                    case "PageDown":
                        e.preventDefault();
                        proximoMes();
                        break;

                    case "Home":
                        e.preventDefault();
                        irParaHoje();

                    case "Escape":

            function ajustarAniversario(dia, mes, ano) {
                // fevereiro = 1 no JavaScript
                if (dia === 29 && mes === 1) {
                    const diasFev = new Date(ano, 2, 0).getDate();

                    if (diasFev === 28) {
                        return { dia: 28, mes: 1 };
                    }
                }

                return { dia, mes };
            }

            function formatarData(dataISO) {
                const [ano, mes, dia] = dataISO.split("-");
                return `${dia}/${mes}/${ano}`;
            }

            function renderListaFeriasSetup() {
                const container = document.getElementById("setupListaFerias");
                if (!container) return;

                container.innerHTML = "";

                vacations.forEach((v, index) => {
                    const item = document.createElement("div");

            function atualizarSaudacao() {
                const user = getUser();
                const el = document.getElementById("userGreeting");

                if (!user.profile.name) return;

                const area = normalizeArea(user.profile.area);
                const config = getAreaConfig(area);

                const hoje = new Date();

                let isAniversario = false;

                if (user.profile.birthday) {
                    const [y, m, d] = user.profile.birthday.split("-");

                    if (hoje.getDate() === Number(d) && hoje.getMonth() === Number(m) - 1) {
                        isAniversario = true;
                    }

                if (isAniversario) {
                    el.innerText = `Feliz Aniversário, ${user.profile.name}! 🎂`;
                } else {
                    const isFolgaHoje = isFolga(hoje);
                    const tipoDia = isFolgaHoje ? "folga" : "trabalho";

                    const mensagem = config[tipoDia].toLowerCase();

            function atualizarFooterBase() {
                const el = document.getElementById("footerBase");
                const user = getUser();

                const partes = [];

                // 📅 BASE
                if (user.settings.base_date) {
                    const [y, m, d] = user.settings.base_date.split("-");
                    partes.push(`Folga Domingo: ${d}/${m}/${y}`);

                // 📆 DSR
                const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];

                const dsr = Number(user.settings.dsr ?? 0);
                partes.push(`DSR: ${diasSemana[dsr]}`);

            function preencherSetup() {
                const user = getUser();

                document.getElementById("setupUserName").value = user.profile.name || "";

                const birthday = user.profile.birthday;

                if (birthday && birthday.includes("-")) {
                    const parts = birthday.split("-");

                    if (parts.length === 3) {
                        const d = parts[2];
                        const m = parts[1];
                        document.getElementById("setupBirthday").value = `${d}/${m}`;
                    } else {
                        document.getElementById("setupBirthday").value = "";
                    }
                } else {
                    document.getElementById("setupBirthday").value = "";
                }

                document.getElementById("setupBaseDate").value = user.settings.base_date || "";

                document.getElementById("areaSelect").value = user.profile.area || "outros";

                if (AREAS_WITHOUT_DSR.includes(area)) {

                document.getElementById("setupScaleType").value = user.settings.scale_type || "";

            function mostrarSetup() {
                const overlayEl = document.getElementById("pickerOverlay");

                if (overlayEl && !overlayEl.hidden) {
                    closePicker();

                    // 🔥 espera realmente fechar (não tempo fixo)
                    const observer = new MutationObserver(() => {
                        if (overlayEl.hidden) {
                            observer.disconnect();
                            abrirSetup();
                        }
                    });

                    observer.observe(overlayEl, { attributes: true, attributeFilter: ["hidden"] });

                    return;
                }

                abrirSetup();

                requestAnimationFrame(() => {
                    toast.classList.add("show");

            function agendarAtualizacaoDiaria() {
                const agora = new Date();

                const proximaMeiaNoite = new Date();
                proximaMeiaNoite.setHours(24, 0, 0, 0);

                const msAteMeiaNoite = proximaMeiaNoite - agora;

                setTimeout(() => {
                    location.reload(); // simples e confiável
                }, msAteMeiaNoite);
            }

            function isValidDate(day, month) {
                const d = Number(day);
                const m = Number(month);

                if (m < 1 || m > 12) return false;
                if (d < 1) return false;

                const daysInMonth = new Date(2024, m, 0).getDate(); // ano fixo evita leap issues
                return d <= daysInMonth;
            }

            function aplicarSetup(user) {
                saveUser(user);

                baseFolgaDomingo = getBaseDate();

                atualizarSaudacao();
                atualizarFooterBase();
                gerarCalendario(anoAtual, mesAtual);

            function getAreaConfig(area) {
                const base = {

                return {

                    ...(AREA_CONFIG[area] || {}),

            function normalizeArea(area) {
                const valid = ["seguranca", "hospital", "supermercado", "industria", "outros"];

                if (!valid.includes(area)) {
                    return "outros";

                return area;

            function atualizarInfoEscala() {

                const hoje = new Date();
                const isFolgaHoje = isFolga(hoje);
                const status = isFolgaHoje ? config.folgaLabel : config.escala;

                el.innerText = `${config.escala}: ${user.settings.scale_pattern} • Hoje: ${status}`;
            }
